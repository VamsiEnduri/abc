{% extends "base.html" %}

{% block content %}
<h2>Patient Profile</h2>

<p>Name: {{ user.name }}</p>
<p>Age: {{ profile.age }}</p>
<p>Blood Group: {{ profile.blood_group }}</p>
<p>Address: {{ profile.address }}</p>
<button>Edit</button>
<form method="POST" action="{% url '_delete' user.id %}">
    {% csrf_token %}
    <button type="submit">Delete</button>
</form>

{% endblock %}
